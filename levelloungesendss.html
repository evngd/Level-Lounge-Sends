if(isPin===undefined){isPin=false;} if(placeholderText===undefined){placeholderText='';} 
return new Promise(function(resolve){
modal.style.display='flex';
requestAnimationFrame(function(){modalCard.style.transform='scale(1)';modalCard.style.opacity='1';});
modalTitle.textContent=title;
modalInput.value='';
if(isPin){modalInput.type='password';modalInput.readOnly=true;modalInput.placeholder='';numpad.style.display='grid';buildPad();}
else{modalInput.type='text';modalInput.readOnly=false;modalInput.placeholder=placeholderText;numpad.style.display='none';setTimeout(function(){modalInput.focus();},50);}
okBtn.onclick=function(){closeModal(modalInput.value,resolve);};
cancelBtn.onclick=function(){closeModal(null,resolve);};
});
}

.style.border='1px solid #ff4b4b';noticeCard.style.boxShadow='0 0 20px rgba(255,75,75,.55),0 0 38px rgba(255,0,0,.28)';notice.style.display='flex';requestAnimationFrame(function(){noticeCard.style.transform='scale(1) translateY(0)';noticeCard.style.opacity='1';});document.getElementById('noticeBtn').onclick=function(){noticeCard.style.transform='scale(.82) translateY(14px)';noticeCard.style.opacity='0';setTimeout(function(){notice.style.display='none';},220);};return;}isMod=true;adminBtn.style.display='inline-block';modStarBtn.style.boxShadow='0 0 16px rgba(255,220,90,.95)';modStarBtn.textContent='✓';noticeCard.innerHTML='<div style="font-size:30px;font-weight:900;margin-bottom:12px">Access Granted</div><div style="font-size:20px;line-height:1.5;color:#7dff9b;font-weight:900;text-shadow:0 0 10px rgba(125,255,155,.95),0 0 18px rgba(0,255,80,.45)">You have mod access</div><button id="noticeBtn" style="margin-top:18px;background:linear-gradient(180deg,#49e37a,#1fa94d);color:#fff;border:none;padding:12px 20px;border-radius:8px;font-weight:900;cursor:pointer">OK</button>';noticeCard.style.border='1px solid #49e37a';noticeCard.style.boxShadow='0 0 20px rgba(73,227,122,.55),0 0 38px rgba(0,255,80,.28)';notice.style.display='flex';requestAnimationFrame(function(){noticeCard.style.transform='scale(1) translateY(0)';noticeCard.style.opacity='1';});document.getElementById('noticeBtn').onclick=function(){noticeCard.style.transform='scale(.82) translateY(14px)';noticeCard.style.opacity='0';setTimeout(function(){notice.style.display='none';},220);};render();}
async function adminAccess(){
if(!isMod){return;}
const levelName=await ask('Level Info',false,'Enter level name');
if(!levelName||!levelName.trim()){return;}
const levelId=await ask('Level ID',false,'Enter level ID');
if(!levelId||!levelId.trim()){return;}
const feature=await pickFeature();
if(feature===null){return;}
sends.unshift({name:levelName.trim()+' ['+levelId.trim()+']',feature:feature});
db.ref('sends').set(sends);
render();
}
function pickFeature(){return new Promise(function(resolve){modal.style.display='flex';requestAnimationFrame(function(){modalCard.style.transform='scale(1)';modalCard.style.opacity='1';});modalTitle.textContent='Feature';modalInput.style.display='none';modalInput.value='';numpad.style.display='grid';numpad.style.gridTemplateColumns='1fr 1fr';numpad.innerHTML='';const opts=[['Base','','#fff'],['Feature','0 0 14px rgba(255,220,60,.7)','#ffe66a'],['Epic','0 0 14px rgba(180,90,255,.7)','#d59bff'],['Legendary','0 0 14px rgba(70,160,255,.7)','#8fc8ff']];opts.forEach(function(o){const b=document.createElement('button');b.className='padBtn';b.textContent=o[0];b.style.fontSize='18px';b.style.fontWeight='900';b.style.boxShadow=o[1];b.style.color=o[2]||'#111';b.onclick=function(){closeModal(o[0],resolve);};numpad.appendChild(b);});okBtn.style.display='none';cancelBtn.onclick=function(){closeModal(null,resolve);};});}
async function rateAccess(){if(!isOwner)return;const levelName=await ask('Rated Level',false,'Enter level name');if(!levelName)return;const levelId=await ask('Level ID',false,'Enter level ID');if(!levelId)return;rated.unshift(levelName+' ['+levelId+']');db.ref('rated').set(rated);render();}
async function requestLevel(){const levelName=await ask('Level Name',false,'Enter level name');if(!levelName||!levelName.trim()){return;}const levelId=await ask('Level ID',false,'Enter level ID');if(!levelId||!levelId.trim()){return;}requests.unshift(levelName.trim()+' ['+levelId.trim()+']');db.ref('requests').set(requests);render();alert('Your request has been sent to moderators.');}
modStarBtn.addEventListener('click',modLogin);
adminBtn.addEventListener('click',adminAccess);

document.getElementById('ratedTopBtn').addEventListener('click',function(){currentPage='rated';render();});
requestBtn.addEventListener('click',requestLevel);
reqsBtn.addEventListener('click',function(){reqsBtn.classList.remove('blam');void reqsBtn.offsetWidth;reqsBtn.classList.add('blam');currentPage=currentPage==='sends'?'requests':'sends';render();setTimeout(function(){reqsBtn.classList.remove('blam');},500);});
refreshBtn.addEventListener('click',function(){const icon=refreshBtn.querySelector('.icon');const label=refreshBtn.querySelector('.label');refreshBtn.classList.add('spinning');label.textContent='Refreshing';setTimeout(function(){render();refreshBtn.classList.remove('spinning');refreshBtn.classList.add('done');icon.textContent='✓';label.textContent='Updated';refreshSound();setTimeout(function(){refreshBtn.classList.remove('done');icon.textContent='↻';label.textContent='Refresh';},1200);},900);});
db.ref('sends').on('value',snap=>{sends=snap.val()||[];render();});
db.ref('requests').on('value',snap=>{requests=snap.val()||[];render();});
db.ref('rated').on('value',snap=>{rated=snap.val()||[];render();});
render();
