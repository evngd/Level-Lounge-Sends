<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>levelloungesends</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
body{background:#0f1115;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px}
.wrapper{width:100%;max-width:820px}
h1{font-size:38px;margin-bottom:20px;text-transform:none}
.panel{background:#1a1d24;border:1px solid #2b2f38;border-radius:18px;padding:22px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
.tab-title{font-size:24px;font-weight:700;margin-bottom:15px;display:flex;align-items:center;justify-content:space-between}.refresh-btn{background:linear-gradient(180deg,#4a5568,#313846);color:#fff;padding:10px 14px;border-radius:12px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;transition:.2s ease;box-shadow:0 4px 10px rgba(0,0,0,.25)}#reqsBtn{box-shadow:0 0 10px rgba(130,90,255,.55),0 0 22px rgba(130,90,255,.35),0 4px 10px rgba(0,0,0,.25)}#reqsBtn:hover{box-shadow:0 0 14px rgba(160,120,255,.75),0 0 28px rgba(160,120,255,.5),0 4px 10px rgba(0,0,0,.25)}.refresh-btn:hover{transform:translateY(-1px)}.refresh-btn.spinning .icon{animation:spin .8s linear infinite}.refresh-btn.done{background:linear-gradient(180deg,#35c46b,#239653)}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes blam{0%{transform:scale(1)}25%{transform:scale(1.18)}50%{transform:scale(.95)}75%{transform:scale(1.08)}100%{transform:scale(1)}}.refresh-btn.blam{animation:blam .45s ease}@keyframes poof{0%{transform:scale(1);opacity:1}60%{transform:scale(1.06);opacity:.75}100%{transform:scale(.82);opacity:0}}@keyframes dust{0%{transform:scale(.6);opacity:0}30%{transform:scale(1.1);opacity:1}100%{transform:scale(1.7);opacity:0}}
#sendsList{max-height:420px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-right:6px}
.send-item{background:linear-gradient(180deg,#313743,#222833);padding:18px 18px;border-radius:16px;border:2px solid #495163;font-size:20px;font-weight:800;display:flex;align-items:center;justify-content:space-between;gap:14px;box-shadow:0 8px 18px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.06);position:relative;overflow:hidden}.send-item.poof{animation:poof .45s ease forwards}.send-item.poof::after{content:'';position:absolute;inset:0;background:radial-gradient(circle,rgba(220,220,220,.55) 0%,rgba(180,180,180,.18) 35%,rgba(0,0,0,0) 70%);animation:dust .45s ease forwards;pointer-events:none}.send-item:hover{transform:translateY(-1px);border-color:#5b6480}.send-text{flex:1;word-break:break-word;letter-spacing:.3px;text-shadow:1px 1px 0 rgba(0,0,0,.45)}.delete-btn{background:linear-gradient(180deg,#ff6a6a,#d93636);color:#fff;padding:10px 14px;border-radius:12px;font-weight:900;font-size:14px;box-shadow:0 4px 10px rgba(0,0,0,.25)}
.controls{margin-top:18px;display:flex;justify-content:space-between;align-items:center;gap:12px}.request-btn{background:linear-gradient(180deg,#ff6a6a,#d93636);color:#fff;padding:14px 18px;border-radius:14px;font-size:16px;font-weight:800;box-shadow:0 6px 12px rgba(0,0,0,.25)}.left-controls{display:flex;gap:12px;align-items:center}
.small{opacity:.75;font-size:14px;margin-top:10px}
button{border:none;cursor:pointer}
#adminBtn{background:#2da9ff;border:4px solid #fff;width:90px;height:90px;border-radius:50%;box-shadow:0 0 0 4px #000 inset,0 6px 12px rgba(0,0,0,.35),0 0 18px rgba(255,200,40,.65),0 0 34px rgba(255,170,0,.45),0 0 54px rgba(255,120,0,.25);color:#fff;font-weight:900;font-size:18px;letter-spacing:1px;text-shadow:2px 2px 0 #000;position:relative}#adminBtn::before{content:'';position:absolute;inset:-10px;border-radius:50%;background:radial-gradient(circle,rgba(255,235,120,.45) 0%,rgba(255,180,0,.28) 35%,rgba(255,120,0,.12) 55%,rgba(255,120,0,0) 72%);z-index:-1;animation:flicker 1.8s ease-in-out infinite}#adminBtn:hover{transform:translateY(-1px) scale(1.03)}@keyframes flicker{0%,100%{opacity:.85;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}25%{opacity:.7}75%{opacity:.95}}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);align-items:center;justify-content:center;z-index:50}
#modalCard{background:linear-gradient(180deg,#222834,#171b23);padding:24px;border-radius:24px;min-width:360px;max-width:92vw;border:1px solid #3a4252;box-shadow:0 20px 50px rgba(0,0,0,.45);transform:scale(.92);opacity:0;transition:all .22s ease}
#modalTitle{font-weight:900;font-size:28px;text-align:center;margin-bottom:14px}
#modalInput{width:100%;margin-bottom:14px;padding:14px;border-radius:16px;border:none;background:#eef1f7;color:#111;font-size:24px;text-align:center}
#numpad{display:none;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.padBtn{padding:16px;border-radius:18px;font-size:26px;background:#eef1f7;color:#111}
.row{display:flex;gap:10px}.action{flex:1;padding:14px;border-radius:16px;font-size:18px;color:#fff}
#okBtn{background:linear-gradient(180deg,#4b8cff,#2d67ff)}
#cancelBtn{background:#343b49}
</style>
</head>
<body>
<div class="wrapper">
<h1>Level Lounge Sends</h1>
<div class="panel">
<div class="tab-title"><span id="pageTitle">Sends Tab</span><div style="display:flex;gap:10px"><button id="reqsBtn" class="refresh-btn"><span class="label">Reqs</span></button><button id="refreshBtn" class="refresh-btn"><span class="icon">↻</span><span class="label">Refresh</span></button></div></div>
<div id="sendsList"></div>
<div class="controls"><div class="left-controls"><button id="requestBtn" class="request-btn">Request</button></div><div style="display:flex;align-items:center;gap:10px"><button id="modStarBtn" title="Mod Access" style="width:38px;height:38px;border-radius:50%;background:linear-gradient(180deg,#5ab6ff,#2d67ff);color:#fff;font-size:18px;font-weight:900;box-shadow:0 0 10px rgba(90,182,255,.65)">★</button><button id="adminBtn" style="display:none">SEND</button></div></div>
<div class="small">Only mods can send levels</div>
</div>
</div>
<div id="notice" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);align-items:center;justify-content:center;z-index:60"><div id="noticeCard" style="background:linear-gradient(180deg,#2a2238,#1a1524);padding:24px;border-radius:22px;max-width:420px;width:92%;border:1px solid #ff4b4b;box-shadow:0 0 20px rgba(255,75,75,.55),0 0 38px rgba(255,0,0,.28);text-align:center;transform:scale(.82) translateY(14px);opacity:0;transition:transform .28s cubic-bezier(.2,.9,.2,1),opacity .28s ease"><div style="font-size:28px;font-weight:900;margin-bottom:12px">Wrong Code</div><div style="font-size:18px;line-height:1.5">Apply to be a mod in the <span style="color:#ff6b6b;font-weight:900;text-shadow:0 0 10px rgba(255,80,80,.95),0 0 18px rgba(255,0,0,.45)">Discord</span></div><div style="margin-top:10px;font-size:15px;font-weight:800;word-break:break-all;color:#8cc8ff;text-shadow:0 0 10px rgba(140,200,255,.7)">https://discord.gg/nMCzdK5zUs</div><button id="noticeBtn" style="margin-top:18px;background:linear-gradient(180deg,#9b59ff,#6f35d8);color:#fff;border:none;padding:12px 18px;border-radius:14px;font-weight:800;cursor:pointer">OK</button></div></div><div id="modal">
<div id="modalCard">
<div id="modalTitle"></div>
<input id="modalInput">
<div id="numpad"></div>
<div class="row">
<button id="okBtn" class="action">OK</button>
<button id="cancelBtn" class="action">Cancel</button>
</div>
</div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
const PASSWORD='0713';
// Firebase live database setup - replace config values with your Firebase project values
const firebaseConfig={apiKey:'AIzaSyDv9GjhHXA89x9ICKuF2RPUBGI9lY2NyCA',authDomain:'level-lounge-sends.firebaseapp.com',databaseURL:'https://level-lounge-sends-default-rtdb.firebaseio.com',projectId:'level-lounge-sends',storageBucket:'level-lounge-sends.firebasestorage.app',messagingSenderId:'471544618919',appId:'1:471544618919:web:f822b473545fa44349e082'};
let sends=[];
let requests=[];
let currentPage='sends';
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const modal=document.getElementById('modal');
const modalCard=document.getElementById('modalCard');
const modalTitle=document.getElementById('modalTitle');
const modalInput=document.getElementById('modalInput');
const numpad=document.getElementById('numpad');
const okBtn=document.getElementById('okBtn');
const cancelBtn=document.getElementById('cancelBtn');
const adminBtn=document.getElementById('adminBtn');
const modStarBtn=document.getElementById('modStarBtn');
let isMod=false;
const refreshBtn=document.getElementById('refreshBtn');
const requestBtn=document.getElementById('requestBtn');
const reqsBtn=document.getElementById('reqsBtn');
const pageTitle=document.getElementById('pageTitle');
const notice=document.getElementById('notice');
const noticeBtn=document.getElementById('noticeBtn');
const noticeCard=document.getElementById('noticeCard');
noticeBtn.addEventListener('click',function(){noticeCard.style.transform='scale(.82) translateY(14px)';noticeCard.style.opacity='0';setTimeout(function(){notice.style.display='none';},220);});
let lastSendCount=sends.length;
function keySound(freq){try{const ctx=new (window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();const f=ctx.createBiquadFilter();o.type='square';o.frequency.setValueAtTime(freq,ctx.currentTime);f.type='lowpass';f.frequency.setValueAtTime(1400,ctx.currentTime);g.gain.setValueAtTime(0.0001,ctx.currentTime);g.gain.linearRampToValueAtTime(0.035,ctx.currentTime+0.002);g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.03);o.connect(f);f.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+0.03);}catch(e){}}
function popupSound(){try{const ctx=new (window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.type='square';o.frequency.setValueAtTime(880,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(1320,ctx.currentTime+0.08);g.gain.setValueAtTime(0.0001,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.08,ctx.currentTime+0.01);g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.18);o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+0.18);}catch(e){}}
function refreshSound(){try{const ctx=new (window.AudioContext||window.webkitAudioContext)();const o1=ctx.createOscillator();const o2=ctx.createOscillator();const g=ctx.createGain();o1.type='triangle';o2.type='triangle';o1.frequency.setValueAtTime(700,ctx.currentTime);o2.frequency.setValueAtTime(1050,ctx.currentTime);g.gain.setValueAtTime(0.0001,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.06,ctx.currentTime+0.01);g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.22);o1.connect(g);o2.connect(g);g.connect(ctx.destination);o1.start();o2.start(ctx.currentTime+0.03);o1.stop(ctx.currentTime+0.18);o2.stop(ctx.currentTime+0.22);}catch(e){}}
function render(){
const list=document.getElementById('sendsList');
list.innerHTML='';
if(currentPage==='sends'){
if(sends.length>lastSendCount){popupSound();}
lastSendCount=sends.length;
pageTitle.textContent='Sends Tab';
if(!sends.length){list.innerHTML='<div class="send-item">No sends yet.</div>';return;}
sends.forEach(function(text,index){const div=document.createElement('div');div.className='send-item';const span=document.createElement('div');span.className='send-text';const item=(typeof text==='string')?{name:text,feature:'Base'}:text;span.textContent=item.name;div.appendChild(span);const badge=document.createElement('div');badge.style.fontWeight='900';badge.style.padding='8px 12px';badge.style.borderRadius='12px';badge.style.fontSize='13px';badge.style.whiteSpace='nowrap';badge.textContent=item.feature||'Base';if((item.feature||'Base')==='Feature'){badge.style.background='rgba(255,220,60,.18)';badge.style.boxShadow='0 0 14px rgba(255,220,60,.55)';badge.style.color='#ffe66a';}else if((item.feature||'Base')==='Epic'){badge.style.background='rgba(180,90,255,.18)';badge.style.boxShadow='0 0 14px rgba(180,90,255,.55)';badge.style.color='#d59bff';}else if((item.feature||'Base')==='Legendary'){badge.style.background='rgba(70,160,255,.18)';badge.style.boxShadow='0 0 14px rgba(70,160,255,.55)';badge.style.color='#8fc8ff';}else{badge.style.background='rgba(255,255,255,.08)';badge.style.color='#fff';}div.appendChild(badge);if(isMod){const del=document.createElement('button');del.className='delete-btn';del.textContent='Delete';del.onclick=function(){div.classList.add('poof');setTimeout(function(){sends.splice(index,1);db.ref('sends').set(sends);
render();},430);};div.appendChild(del);}list.appendChild(div);});
}else{
pageTitle.textContent='Requests';
if(!requests.length){list.innerHTML='<div class="send-item">No requests yet.</div>';return;}
requests.forEach(function(text,index){const div=document.createElement('div');div.className='send-item';const span=document.createElement('div');span.className='send-text';span.textContent=text;div.appendChild(span);if(isMod){const del=document.createElement('button');del.className='delete-btn';del.textContent='Delete';del.onclick=function(){div.classList.add('poof');setTimeout(function(){requests.splice(index,1);db.ref('requests').set(requests);render();},430);};div.appendChild(del);}list.appendChild(div);});
}
}
function closeModal(value,resolver){
okBtn.style.display='block';
modalInput.style.display='block';
numpad.style.gridTemplateColumns='repeat(3,1fr)';
modalCard.style.transform='scale(.92)';
modalCard.style.opacity='0';
setTimeout(function(){modal.style.display='none';resolver(value);},180);
}
function buildPad(){
numpad.innerHTML='';
for(let i=1;i<=9;i++){
const b=document.createElement('button');
b.className='padBtn';
b.textContent=String(i);
b.onclick=function(){modalInput.value+=String(i);keySound(240);};
numpad.appendChild(b);
}
const clear=document.createElement('button');
clear.className='padBtn';clear.textContent='Clear';clear.onclick=function(){modalInput.value='';keySound(180);};
const zero=document.createElement('button');
zero.className='padBtn';zero.textContent='0';zero.onclick=function(){modalInput.value+='0';keySound(220);};
const del=document.createElement('button');
del.className='padBtn';del.textContent='⌫';del.onclick=function(){modalInput.value=modalInput.value.slice(0,-1);keySound(200);};
numpad.appendChild(clear);numpad.appendChild(zero);numpad.appendChild(del);
}
function ask(title,isPin,placeholderText){
if(isPin===undefined){isPin=false;} if(placeholderText===undefined){placeholderText='';} 
return new Promise(function(resolve){
modal.style.display='flex';
requestAnimationFrame(function(){modalCard.style.transform='scale(1)';modalCard.style.opacity='1';});
modalTitle.textContent=title;
modalInput.value='';
if(isPin){modalInput.type='password';modalInput.readOnly=true;modalInput.placeholder='';numpad.style.display='grid';buildPad();}
else{modalInput.type='text';modalInput.readOnly=false;modalInput.placeholder=placeholderText;numpad.style.display='none';setTimeout(function(){modalInput.focus();},50);}
okBtn.onclick=function(){closeModal(modalInput.value,resolve);};
cancelBtn.onclick=function(){closeModal(null,resolve);};
});
}
async function modLogin(){const pass=await ask('Enter Mod Code',true);if(pass===null)return;if(pass!==PASSWORD){noticeCard.innerHTML='<div style="font-size:28px;font-weight:900;margin-bottom:12px">Wrong Code</div><div style="font-size:18px;line-height:1.5">Apply to be a mod in the <span style="color:#ff6b6b;font-weight:900;text-shadow:0 0 10px rgba(255,80,80,.95),0 0 18px rgba(255,0,0,.45)">Discord</span></div><div style="margin-top:10px;font-size:15px;font-weight:800;word-break:break-all;color:#ff9b9b;text-shadow:0 0 10px rgba(255,80,80,.7)">https://discord.gg/nMCzdK5zUs</div><button id="noticeBtn" style="margin-top:18px;background:linear-gradient(180deg,#ff6a6a,#d93636);color:#fff;border:none;padding:12px 18px;border-radius:14px;font-weight:800;cursor:pointer">OK</button>';noticeCard.style.border='1px solid #ff4b4b';noticeCard.style.boxShadow='0 0 20px rgba(255,75,75,.55),0 0 38px rgba(255,0,0,.28)';notice.style.display='flex';requestAnimationFrame(function(){noticeCard.style.transform='scale(1) translateY(0)';noticeCard.style.opacity='1';});document.getElementById('noticeBtn').onclick=function(){noticeCard.style.transform='scale(.82) translateY(14px)';noticeCard.style.opacity='0';setTimeout(function(){notice.style.display='none';},220);};return;}isMod=true;adminBtn.style.display='inline-block';modStarBtn.style.boxShadow='0 0 16px rgba(255,220,90,.95)';modStarBtn.textContent='✓';noticeCard.innerHTML='<div style="font-size:28px;font-weight:900;margin-bottom:12px">Access Granted</div><div style="font-size:18px;line-height:1.5;color:#7dff9b;font-weight:900;text-shadow:0 0 10px rgba(125,255,155,.95),0 0 18px rgba(0,255,80,.45)">You have mod access</div><button id="noticeBtn" style="margin-top:18px;background:linear-gradient(180deg,#49e37a,#1fa94d);color:#fff;border:none;padding:12px 18px;border-radius:14px;font-weight:800;cursor:pointer">OK</button>';noticeCard.style.border='1px solid #49e37a';noticeCard.style.boxShadow='0 0 20px rgba(73,227,122,.55),0 0 38px rgba(0,255,80,.28)';notice.style.display='flex';requestAnimationFrame(function(){noticeCard.style.transform='scale(1) translateY(0)';noticeCard.style.opacity='1';});document.getElementById('noticeBtn').onclick=function(){noticeCard.style.transform='scale(.82) translateY(14px)';noticeCard.style.opacity='0';setTimeout(function(){notice.style.display='none';},220);};render();}
async function adminAccess(){
if(!isMod){return;}
const levelName=await ask('Level Info',false,'Enter level name');
if(!levelName||!levelName.trim()){return;}
const levelId=await ask('Level ID',false,'Enter level ID');
if(!levelId||!levelId.trim()){return;}
const feature=await pickFeature();
if(feature===null){return;}
sends.unshift({name:levelName.trim()+' ['+levelId.trim()+']',feature:feature});
db.ref('sends').set(sends);
render();
}
function pickFeature(){return new Promise(function(resolve){modal.style.display='flex';requestAnimationFrame(function(){modalCard.style.transform='scale(1)';modalCard.style.opacity='1';});modalTitle.textContent='Feature';modalInput.style.display='none';modalInput.value='';numpad.style.display='grid';numpad.style.gridTemplateColumns='1fr 1fr';numpad.innerHTML='';const opts=[['Base','','#fff'],['Feature','0 0 14px rgba(255,220,60,.7)','#ffe66a'],['Epic','0 0 14px rgba(180,90,255,.7)','#d59bff'],['Legendary','0 0 14px rgba(70,160,255,.7)','#8fc8ff']];opts.forEach(function(o){const b=document.createElement('button');b.className='padBtn';b.textContent=o[0];b.style.fontSize='18px';b.style.fontWeight='900';b.style.boxShadow=o[1];b.style.color=o[2]||'#111';b.onclick=function(){closeModal(o[0],resolve);};numpad.appendChild(b);});okBtn.style.display='none';cancelBtn.onclick=function(){closeModal(null,resolve);};});}
async function requestLevel(){const levelName=await ask('Level Name',false,'Enter level name');if(!levelName||!levelName.trim()){return;}const levelId=await ask('Level ID',false,'Enter level ID');if(!levelId||!levelId.trim()){return;}requests.unshift(levelName.trim()+' ['+levelId.trim()+']');db.ref('requests').set(requests);render();alert('Your request has been sent to moderators.');}
modStarBtn.addEventListener('click',modLogin);
adminBtn.addEventListener('click',adminAccess);
requestBtn.addEventListener('click',requestLevel);
reqsBtn.addEventListener('click',function(){reqsBtn.classList.remove('blam');void reqsBtn.offsetWidth;reqsBtn.classList.add('blam');currentPage=currentPage==='sends'?'requests':'sends';render();setTimeout(function(){reqsBtn.classList.remove('blam');},500);});
refreshBtn.addEventListener('click',function(){const icon=refreshBtn.querySelector('.icon');const label=refreshBtn.querySelector('.label');refreshBtn.classList.add('spinning');label.textContent='Refreshing';setTimeout(function(){render();refreshBtn.classList.remove('spinning');refreshBtn.classList.add('done');icon.textContent='✓';label.textContent='Updated';refreshSound();setTimeout(function(){refreshBtn.classList.remove('done');icon.textContent='↻';label.textContent='Refresh';},1200);},900);});
db.ref('sends').on('value',snap=>{sends=snap.val()||[];render();});
db.ref('requests').on('value',snap=>{requests=snap.val()||[];render();});
render();
</script>
</body>
</html>
